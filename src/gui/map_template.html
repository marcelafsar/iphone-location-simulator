<!DOCTYPE html>
<html>
<head>
    <title>Marcel Location Simulator - Map Viewer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Leaflet loaded from local bundled assets to avoid CDN failures on file:// pages -->
    <link rel="stylesheet" href="assets/leaflet.css" />
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0d0e12;
        }
        .leaflet-container {
            background-color: #0d0e12 !important;
        }
        /* Pulse animation for current location marker */
        .pulse-marker {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2196F3;
            border: 2px solid white;
            box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7);
            animation: pulse 1.6s infinite cubic-bezier(0.66, 0, 0, 1);
        }
        @keyframes pulse {
            to { box-shadow: 0 0 0 16px rgba(33, 150, 243, 0); }
        }
        /* Destination marker */
        .dest-marker {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e53935;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .leaflet-bar {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
        }
        .leaflet-bar a {
            background-color: #161820 !important;
            color: #ffffff !important;
            border-bottom: 1px solid #2e2e38 !important;
            transition: all 0.2s ease;
        }
        .leaflet-bar a:hover {
            background-color: #2a2b35 !important;
            color: #2196F3 !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Local Leaflet — no network required -->
    <script src="assets/leaflet.js"></script>
    <script>
        var map;
        var currentPositionMarker = null;
        var destinationMarker = null;
        var routePolyline = null;

        function initMap(lat, lon, zoom) {
            if (map) { return; }  // guard against double-init
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([lat, lon], zoom);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            map.on('click', function(e) {
                console.log("CLICK:START:" + e.latlng.lat + "," + e.latlng.lng);
            });
            map.on('contextmenu', function(e) {
                console.log("CLICK:DEST:" + e.latlng.lat + "," + e.latlng.lng);
            });
        }

        function updateCurrentPosition(lat, lon) {
            if (!map) { return; }
            var latlng = [lat, lon];
            var pulseIcon = L.divIcon({
                className: 'pulse-marker-container',
                html: '<div class="pulse-marker"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            if (currentPositionMarker) {
                currentPositionMarker.setLatLng(latlng);
            } else {
                currentPositionMarker = L.marker(latlng, { icon: pulseIcon, draggable: true }).addTo(map);
                currentPositionMarker.on('dragend', function(e) {
                    var pos = e.target.getLatLng();
                    console.log("DRAG:START:" + pos.lat + "," + pos.lng);
                });
            }
        }

        function setDestination(lat, lon) {
            if (!map) { return; }
            var latlng = [lat, lon];
            var destIcon = L.divIcon({
                className: 'dest-marker-container',
                html: '<div class="dest-marker"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            if (destinationMarker) {
                destinationMarker.setLatLng(latlng);
            } else {
                destinationMarker = L.marker(latlng, { icon: destIcon, draggable: true }).addTo(map);
                destinationMarker.on('dragend', function(e) {
                    var pos = e.target.getLatLng();
                    console.log("DRAG:DEST:" + pos.lat + "," + pos.lng);
                });
            }
        }

        function drawRoute(coordinatesJson) {
            if (!map) { return; }
            var coords = JSON.parse(coordinatesJson);
            if (routePolyline) { map.removeLayer(routePolyline); }
            routePolyline = L.polyline(coords, {
                color: '#2196F3',
                weight: 5,
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(map);
            map.fitBounds(routePolyline.getBounds(), { padding: [50, 50] });
        }

        function clearMap() {
            if (!map) { return; }
            if (destinationMarker) { map.removeLayer(destinationMarker); destinationMarker = null; }
            if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
        }

        function panTo(lat, lon, zoom) {
            if (!map) { return; }
            if (zoom) {
                map.setView([lat, lon], zoom, { animate: true });
            } else {
                map.panTo([lat, lon], { animate: true });
            }
        }
    </script>
</body>
</html>
