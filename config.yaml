app:
  author: Marcel Afsar
  language: en
  name: Marcel Location Simulator
  theme: dark
  version: 1.0.0
database:
  backup_enabled: true
  backup_interval: 7
  path: data/favorites.db
features:
  auto_reconnect: true
  is_frozen: false
  save_last_location: true
  show_notifications: true
location:
  default_speed: 5.0
  max_speed: 100.0
  min_speed: 1.0
  update_interval: 1.0
logging:
  backup_count: 5
  file_path: data/logs/app.log
  level: INFO
  max_size: 10485760
map:
  default_center:
    latitude: 40.7128
    longitude: -74.006
  default_zoom: 15
  tile_layer: CartoDB
ui:
  remember_position: true
  show_tooltips: true
  window_height: 850
  window_width: 1200
